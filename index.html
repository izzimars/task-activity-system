<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Tasks Demo</title>
    <style>
      body {
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem;
        background: linear-gradient(180deg, #f3f7fb 0%, #ffffff 100%);
        color: #0f172a;
      }
      .container {
        max-width: 920px;
        margin: 0 auto;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .status {
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      input,
      select,
      button {
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
      }
      button {
        background: #0f766e;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        margin-bottom: 0.5rem;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem;
        background: #fff;
      }
      .task-meta {
        font-size: 0.82rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Real-Time Task Dashboard</h1>
      <p class="status" id="connection">WebSocket: connecting...</p>

      <div class="card">
        <h3>Create Task</h3>
        <div class="row">
          <input id="title" placeholder="Task title" />
          <input id="description" placeholder="Description" />
          <select id="status">
            <option value="todo">todo</option>
            <option value="in_progress">in_progress</option>
            <option value="done">done</option>
          </select>
          <button id="createBtn">Create</button>
        </div>
      </div>

      <h3>Tasks</h3>
      <ul id="taskList"></ul>
    </div>

    <script>
      const API_BASE = "http://localhost:3000/api/v1";
      const WS_URL = "ws://localhost:3000/ws";

      const taskList = document.getElementById("taskList");
      const connection = document.getElementById("connection");
      const createBtn = document.getElementById("createBtn");

      let tasks = [];

      const renderTasks = () => {
        taskList.innerHTML = tasks
          .map(
            (task) => `
              <li>
                <strong>${task.title}</strong>
                <div>${task.description || ""}</div>
                <div class="task-meta">Status: ${task.status} | Updated: ${new Date(task.updated_at).toLocaleString()}</div>
              </li>
            `
          )
          .join("");
      };

      const loadTasks = async () => {
        const response = await fetch(`${API_BASE}/tasks`);
        tasks = await response.json();
        renderTasks();
      };

      const connectWebSocket = () => {
        const socket = new WebSocket(WS_URL);

        socket.onopen = () => {
          connection.textContent = "WebSocket: connected";
        };

        socket.onmessage = async (event) => {
          const message = JSON.parse(event.data);
          if (message.event === "task:updated") {
            await loadTasks();
          }
        };

        socket.onclose = () => {
          connection.textContent = "WebSocket: disconnected (retrying...)";
          setTimeout(connectWebSocket, 1500);
        };
      };

      createBtn.addEventListener("click", async () => {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const status = document.getElementById("status").value;

        if (!title.trim()) return;

        await fetch(`${API_BASE}/tasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, description, status })
        });

        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
      });

      loadTasks();
      connectWebSocket();
    </script>
  </body>
</html>
